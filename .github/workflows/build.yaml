name: Build AdaptixC2 (amd64)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout builder repo
      uses: actions/checkout@v3
      with:
        repository: cHJlaXpoZXI/AdaptixC2_builder
        path: builder

    - name: Checkout AdaptixC2 source
      uses: actions/checkout@v3
      with:
        repository: Adaptix-Framework/AdaptixC2
        path: source

    - name: Install server dependencies
      run: |
        sudo apt update
        sudo apt install -y mingw-w64 make gcc g++ g++-mingw-w64 git wget unzip

        # Install Go 1.25.4
        wget https://go.dev/dl/go1.25.4.linux-amd64.tar.gz -O /tmp/go1.25.4.linux-amd64.tar.gz
        sudo rm -rf /usr/local/go /usr/local/bin/go
        sudo tar -C /usr/local -xzf /tmp/go1.25.4.linux-amd64.tar.gz
        sudo ln -s /usr/local/go/bin/go /usr/local/bin/go

        # Windows 7 support by gopher agent
        git clone https://github.com/Adaptix-Framework/go-win7 /tmp/go-win7
        sudo mv /tmp/go-win7 /usr/lib/

    - name: Install client dependencies
      run: |
        sudo apt install -y gcc g++ build-essential make cmake mingw-w64 g++-mingw-w64 \
          libssl-dev qt6-base-dev qt6-base-private-dev libxkbcommon-dev qt6-websockets-dev \
          qt6-declarative-dev qt6-svg-dev libgl1-mesa-dev ninja-build

    - name: Build everything (amd64)
      run: |
        cd builder
        make all SRC=../source

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp -r builder/output/server artifacts/AdaptixC2Server-amd64
        cp -r builder/output/client artifacts/AdaptixC2Client-amd64
        cp -r builder/output/extender artifacts/AdaptixC2Extender-amd64

    - name: Create GitHub Release
      id: release
      uses: actions/create-release@v1
      with:
        tag_name: v${{ github.run_number }}
        release_name: AdaptixC2 amd64 build ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Server
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: artifacts/AdaptixC2Server-amd64
        asset_name: AdaptixC2Server-amd64
        asset_content_type: application/octet-stream

    - name: Upload Client
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: artifacts/AdaptixC2Client-amd64
        asset_name: AdaptixC2Client-amd64
        asset_content_type: application/octet-stream

    - name: Upload Extender
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: artifacts/AdaptixC2Extender-amd64
        asset_name: AdaptixC2Extender-amd64
        asset_content_type: application/octet-stream
