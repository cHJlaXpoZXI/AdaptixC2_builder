name: Build AdaptixC2 (amd64)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # -----------------------
    # Checkout repositories
    # -----------------------
    - name: Checkout builder repo
      uses: actions/checkout@v3
      with:
        repository: cHJlaXpoZXI/AdaptixC2_builder
        path: builder

    - name: Checkout AdaptixC2 source
      uses: actions/checkout@v3
      with:
        repository: Adaptix-Framework/AdaptixC2
        path: source

    # -----------------------
    # Install server dependencies
    # -----------------------
    - name: Install server dependencies
      run: |
        sudo apt update
        sudo apt install -y mingw-w64 make gcc g++ g++-mingw-w64 git wget unzip build-essential

        # Install Go 1.25.4
        wget https://go.dev/dl/go1.25.4.linux-amd64.tar.gz -O /tmp/go1.25.4.linux-amd64.tar.gz
        sudo rm -rf /usr/local/go /usr/local/bin/go
        sudo tar -C /usr/local -xzf /tmp/go1.25.4.linux-amd64.tar.gz
        sudo ln -s /usr/local/go/bin/go /usr/local/bin/go

        # Windows 7 support for gopher agent
        git clone https://github.com/Adaptix-Framework/go-win7 /tmp/go-win7
        sudo mv /tmp/go-win7 /usr/lib/

    # -----------------------
    # Install client dependencies (Qt 6.8.0)
    # -----------------------
    - name: Install Qt 6.8.0 and client deps
      run: |
        sudo apt update
        sudo apt install -y gcc g++ build-essential cmake ninja-build mingw-w64 g++-mingw-w64 \
            libssl-dev libgl1-mesa-dev

        # Download Qt 6.8.0 source
        wget https://download.qt.io/archive/qt/6.8/6.8.0/qt-everywhere-src-6.8.0.tar.xz -O /tmp/qt6.8.0.tar.xz
        mkdir -p $HOME/Qt6.8.0
        tar -xf /tmp/qt6.8.0.tar.xz -C $HOME/Qt6.8.0 --strip-components=1

        # Build Qt 6.8.0
        cd $HOME/Qt6.8.0
        mkdir build && cd build
        ../configure -prefix $HOME/Qt6.8.0/installed -nomake examples -nomake tests
        make -j$(nproc)
        make install

        # Set environment variables
        echo "$HOME/Qt6.8.0/installed/lib/cmake/Qt6" >> $GITHUB_ENV
        echo "$HOME/Qt6.8.0/installed/bin" >> $GITHUB_PATH

    # -----------------------
    # Build everything
    # -----------------------
    - name: Build AdaptixC2
      run: |
        export CMAKE_PREFIX_PATH=$HOME/Qt6.8.0/installed/lib/cmake/Qt6
        cd builder
        make all SRC=../source

    # -----------------------
    # Prepare artifacts
    # -----------------------
    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp -r builder/output/server artifacts/AdaptixC2Server-amd64
        cp -r builder/output/client artifacts/AdaptixC2Client-amd64
        cp -r builder/output/extender artifacts/AdaptixC2Extender-amd64

    # -----------------------
    # Create GitHub Release
    # -----------------------
    - name: Create Release
      id: release
      uses: actions/create-release@v1
      with:
        tag_name: v${{ github.run_number }}
        release_name: AdaptixC2 amd64 build ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # -----------------------
    # Upload assets
    # -----------------------
    - name: Upload Server
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: artifacts/AdaptixC2Server-amd64
        asset_name: AdaptixC2Server-amd64
        asset_content_type: application/octet-stream

    - name: Upload Client
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: artifacts/AdaptixC2Client-amd64
        asset_name: AdaptixC2Client-amd64
        asset_content_type: application/octet-stream

    - name: Upload Extender
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.release.outputs.upload_url }}
        asset_path: artifacts/AdaptixC2Extender-amd64
        asset_name: AdaptixC2Extender-amd64
        asset_content_type: application/octet-stream
